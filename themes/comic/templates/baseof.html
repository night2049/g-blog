<!doctype html>
<html lang="{{lang}}" data-root="{{rootPrefix}}">
  <head>
{{> head}}
  </head>
  <body>
    <!-- 全局 SVG 滤镜定义 (手绘风核心): feTurbulence + feDisplacementMap 给 .ink-icon 注入轻微抖线,
         与正文不规则手绘圆角 + 墨线描边形成统一语言. 隐藏自身, 仅供 url(#ink-wobble) 引用. -->
    <svg aria-hidden="true" focusable="false" width="0" height="0" style="position:absolute;width:0;height:0;overflow:hidden">
      <defs>
        <filter id="ink-wobble" x="-10%" y="-10%" width="120%" height="120%">
          <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="3" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.4"/>
        </filter>
        <filter id="ink-wobble-strong" x="-15%" y="-15%" width="130%" height="130%">
          <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="2" seed="7" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4"/>
        </filter>
      </defs>
    </svg>
    <main class="page">
{{> header}}
{{> main}}
{{> footer}}
    </main>
    <script src="{{rootPrefix}}chrome.js" defer></script>
    {{widgets}}
    {{scripts}}
  </body>
</html>
