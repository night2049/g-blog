<header class="site-header">
      <div class="site-logo" id="site-logo"></div>
      <nav class="site-nav" id="site-nav"></nav>
      <div class="header-actions">
        <button
          id="nav-toggle"
          class="nav-toggle"
          type="button"
          aria-label="菜单"
          aria-haspopup="true"
          aria-controls="site-nav"
          aria-expanded="false"
        >
          <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor" aria-hidden="true">
            <path d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z" />
          </svg>
        </button>
        <div class="rss-menu" id="rss-menu">
          <button
            id="rss-toggle"
            class="rss-toggle"
            type="button"
            aria-label="订阅 (RSS)"
            aria-haspopup="true"
            aria-controls="rss-links"
            aria-expanded="false"
          >
            <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor" aria-hidden="true">
              <circle cx="6.18" cy="17.82" r="2.18" />
              <path d="M4 4.44v2.83c7.03 0 12.73 5.7 12.73 12.73h2.83C19.56 11.4 12.6 4.44 4 4.44z" />
              <path d="M4 10.1v2.83c3.9 0 7.07 3.17 7.07 7.07h2.83C13.9 14.4 9.6 10.1 4 10.1z" />
            </svg>
          </button>
          <div class="rss-panel" id="rss-links" role="menu" hidden></div>
        </div>
        <button
          id="theme-toggle"
          class="theme-toggle"
          type="button"
          aria-label="切换主题"
        ></button>
      </div>
    </header>
